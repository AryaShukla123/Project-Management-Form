name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Secret Token into config.js
        run: |
          mkdir -p public_html/js
          echo 'const CONFIG = { CONNECTION_TOKEN: "${{ secrets.L2E_TOKEN }}" };' > public_html/js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public_html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
